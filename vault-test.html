<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Olimpo — Vault</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      gap: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 400;
      opacity: 0.4;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 32px;
    }

    .vault-grid {
      display: flex;
      flex-direction: column;
      gap: 24px;
      width: 100%;
      max-width: 480px;
    }

    /* ---- Category Section ---- */
    .vault-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .vault-section__title {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.3;
      padding-left: 4px;
    }

    .vault-section__list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ---- Component Card ---- */
    .vault-card {
      background: #141414;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .vault-card__header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .vault-card__name {
      font-weight: 500;
      font-size: 15px;
    }

    .vault-card__category {
      font-size: 12px;
      opacity: 0.35;
    }

    /* ---- Rename Input ---- */
    .vault-card__rename {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .vault-card__input {
      flex: 1;
      padding: 10px 14px;
      background: #0a0a0a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .vault-card__input:focus {
      border-color: rgba(255,255,255,0.3);
    }

    .vault-card__input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    /* ---- Copy Button ---- */
    .vault-copy {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      background: #1e1e1e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .vault-copy:hover {
      background: #282828;
      border-color: rgba(255,255,255,0.2);
    }

    .vault-copy:disabled {
      opacity: 0.4;
      cursor: wait;
    }

    .vault-copy .success {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1e1e1e;
      color: #4ade80;
      font-weight: 600;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    .vault-copy.is-copied {
      border-color: rgba(74, 222, 128, 0.3);
    }

    .vault-copy.is-copied .success { opacity: 1; }

    .vault-copy.is-error {
      border-color: rgba(248, 113, 113, 0.3);
    }

    .info {
      font-size: 12px;
      opacity: 0.25;
      max-width: 440px;
      text-align: center;
      line-height: 1.7;
      margin-top: 32px;
    }

    .info strong {
      opacity: 1;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>

  <h1>Studio Olimpo — Vault</h1>

  <div class="vault-grid">

    <!-- ==================== NAV ==================== -->
    <div class="vault-section">
      <div class="vault-section__title">Nav</div>
      <div class="vault-section__list">

        <!-- HEADER -->
        <div class="vault-card">
          <div class="vault-card__header">
            <div class="vault-card__name">Header</div>
          </div>
          <div class="vault-card__rename">
            <input
              class="vault-card__input"
              type="text"
              data-prefix="header"
              placeholder="header"
              value="header"
              spellcheck="false"
              autocomplete="off"
            />
            <button
              class="vault-copy"
              data-vault="https://cdn.jsdelivr.net/gh/studioolimpo/Studio-Olimpo-Library@main/nav/header.json"
              data-prefix="header"
            >
              <span class="label">Copy</span>
              <span class="success">✓ Copied</span>
            </button>
          </div>
        </div>

        <!-- MENU BUTTON -->
        <div class="vault-card">
          <div class="vault-card__header">
            <div class="vault-card__name">Menu Button</div>
          </div>
          <div class="vault-card__rename">
            <input
              class="vault-card__input"
              type="text"
              data-prefix="menu_btn"
              placeholder="menu_btn"
              value="menu_btn"
              spellcheck="false"
              autocomplete="off"
            />
            <button
              class="vault-copy"
              data-vault="https://cdn.jsdelivr.net/gh/studioolimpo/Studio-Olimpo-Library@main/nav/menu_button.json"
              data-prefix="menu_btn"
            >
              <span class="label">Copy</span>
              <span class="success">✓ Copied</span>
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- ==================== BUTTON ==================== -->
    <div class="vault-section">
      <div class="vault-section__title">Button</div>
      <div class="vault-section__list">

        <!-- BUTTON TEXT -->
        <div class="vault-card">
          <div class="vault-card__header">
            <div class="vault-card__name">Button Text</div>
          </div>
          <div class="vault-card__rename">
            <input
              class="vault-card__input"
              type="text"
              data-prefix="button_main"
              placeholder="button_main"
              value="button_main"
              spellcheck="false"
              autocomplete="off"
            />
            <button
              class="vault-copy"
              data-vault="https://cdn.jsdelivr.net/gh/studioolimpo/Studio-Olimpo-Library@main/button/button-text.json"
              data-prefix="button_main"
            >
              <span class="label">Copy</span>
              <span class="success">✓ Copied</span>
            </button>
          </div>
        </div>

      </div>
    </div>

    <!-- ==================== SLIDER ==================== -->
    <div class="vault-section">
      <div class="vault-section__title">Slider</div>
      <div class="vault-section__list">

        <!-- SMOOOTHY SLIDER -->
        <div class="vault-card">
          <div class="vault-card__header">
            <div class="vault-card__name">Smooothy Slider</div>
          </div>
          <div class="vault-card__rename">
            <input
              class="vault-card__input"
              type="text"
              data-prefix="slider"
              placeholder="slider"
              value="slider"
              spellcheck="false"
              autocomplete="off"
            />
            <button
              class="vault-copy"
              data-vault="https://cdn.jsdelivr.net/gh/studioolimpo/Studio-Olimpo-Library@main/slider/smooothy-slider-v1.json"
              data-prefix="slider"
            >
              <span class="label">Copy</span>
              <span class="success">✓ Copied</span>
            </button>
          </div>
        </div>

      </div>
    </div>

  </div>

  <p class="info">
    Scrivi il nome che vuoi per le classi → clicca <strong>Copy</strong> →
    vai nel Webflow Designer → <strong>Cmd+V</strong>
  </p>

  <script>
    // =============================================
    // VAULT — Copy to Webflow with class renaming
    // =============================================

    const cache = {};

    function renameClasses(jsonString, oldPrefix, newPrefix) {
      if (!oldPrefix || !newPrefix || oldPrefix === newPrefix) return jsonString;

      try {
        const data = JSON.parse(jsonString);

        if (data.payload && data.payload.styles) {
          data.payload.styles.forEach(style => {
            if (style.name && style.name.startsWith(oldPrefix)) {
              style.name = newPrefix + style.name.slice(oldPrefix.length);
            }
          });
        }

        if (data.payload && data.payload.nodes) {
          data.payload.nodes.forEach(node => {
            if (node.v && typeof node.v === 'string') {
              node.v = node.v.replaceAll(oldPrefix, newPrefix);
            }
            if (node.data && node.data.embed && node.data.embed.meta && node.data.embed.meta.html) {
              node.data.embed.meta.html = node.data.embed.meta.html.replaceAll(oldPrefix, newPrefix);
            }
          });
        }

        return JSON.stringify(data);
      } catch (e) {
        return jsonString.replaceAll(oldPrefix, newPrefix);
      }
    }

    function sanitizeInput(input, original) {
      let val = input.value
        .toLowerCase()
        .replace(/\s+/g, '-')
        .replace(/[^a-z0-9\-_]/g, '')
        .replace(/^[-_]+|[-_]+$/g, '');
      if (!val) val = original;
      input.value = val;
    }

    document.querySelectorAll('.vault-copy').forEach(btn => {
      const card = btn.closest('.vault-card');
      const input = card.querySelector('.vault-card__input');
      const originalPrefix = btn.getAttribute('data-prefix');

      input.addEventListener('blur', () => sanitizeInput(input, originalPrefix));
      input.addEventListener('focus', () => input.select());
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          btn.click();
        }
      });

      btn.addEventListener('mouseenter', async () => {
        const url = btn.getAttribute('data-vault');
        if (url && !cache[url]) {
          try {
            const res = await fetch(url);
            if (res.ok) {
              const data = await res.json();
              cache[url] = JSON.stringify(data);
            }
          } catch (e) {}
        }
      }, { once: true });

      btn.addEventListener('click', async () => {
        const url = btn.getAttribute('data-vault');
        if (!url || btn.disabled) return;

        sanitizeInput(input, originalPrefix);
        const newPrefix = input.value;

        btn.disabled = true;

        try {
          let payload = cache[url];
          if (!payload) {
            const res = await fetch(url);
            if (!res.ok) throw new Error('Fetch failed: ' + res.status);
            const data = await res.json();
            payload = JSON.stringify(data);
            cache[url] = payload;
          }

          const renamedPayload = renameClasses(payload, originalPrefix, newPrefix);

          let copied = false;

          function onCopy(e) {
            e.preventDefault();
            e.clipboardData.setData('application/json', renamedPayload);
            e.clipboardData.setData('text/plain', renamedPayload);
            copied = true;
          }

          document.addEventListener('copy', onCopy);
          document.execCommand('copy');
          document.removeEventListener('copy', onCopy);

          if (!copied) {
            await navigator.clipboard.writeText(renamedPayload);
          }

          btn.classList.add('is-copied');
          setTimeout(() => btn.classList.remove('is-copied'), 1500);

        } catch (err) {
          console.error('[Vault]', err);
          btn.classList.add('is-error');
          setTimeout(() => btn.classList.remove('is-error'), 2000);

        } finally {
          btn.disabled = false;
        }
      });
    });
  </script>

</body>
</html>

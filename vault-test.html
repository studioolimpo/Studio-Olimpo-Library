<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Olimpo — Vault</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      gap: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 400;
      opacity: 0.4;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 32px;
    }

    .vault-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 440px;
    }

    .vault-copy {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: #141414;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      color: #fff;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .vault-copy:hover {
      background: #1c1c1c;
      border-color: rgba(255,255,255,0.15);
    }

    .vault-copy:disabled {
      opacity: 0.4;
      cursor: wait;
    }

    .vault-copy .name {
      font-weight: 500;
    }

    .vault-copy .category {
      font-size: 12px;
      opacity: 0.4;
      margin-top: 2px;
    }

    .vault-copy .action {
      font-size: 12px;
      opacity: 0.5;
      white-space: nowrap;
    }

    .vault-copy .success {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #141414;
      color: #4ade80;
      font-weight: 600;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .vault-copy.is-copied {
      border-color: rgba(74, 222, 128, 0.3);
    }

    .vault-copy.is-copied .success { opacity: 1; }

    .vault-copy.is-error {
      border-color: rgba(248, 113, 113, 0.3);
    }

    .vault-copy.is-error .action {
      color: #f87171;
      opacity: 1;
    }

    .info {
      font-size: 12px;
      opacity: 0.25;
      max-width: 400px;
      text-align: center;
      line-height: 1.7;
      margin-top: 32px;
    }
  </style>
</head>
<body>

  <h1>Studio Olimpo — Vault</h1>

  <div class="vault-grid">

    <!-- BUTTON TEXT -->
    <button
      class="vault-copy"
      data-vault="https://cdn.jsdelivr.net/gh/studioolimpo/Studio-Olimpo-Library@main/button/button-text.json"
      data-name="Button Text"
    >
      <div>
        <div class="name">Button Text</div>
        <div class="category">button</div>
      </div>
      <div class="action">Copy to Webflow</div>
      <div class="success">✓ Copied — Cmd+V in Webflow</div>
    </button>

    <!-- SMOOOTHY SLIDER -->
    <button
      class="vault-copy"
      data-vault="https://cdn.jsdelivr.net/gh/studioolimpo/Studio-Olimpo-Library@main/slider/smooothy-slider-v1.json"
      data-name="Smooothy Slider"
    >
      <div>
        <div class="name">Smooothy Slider</div>
        <div class="category">slider</div>
      </div>
      <div class="action">Copy to Webflow</div>
      <div class="success">✓ Copied — Cmd+V in Webflow</div>
    </button>

  </div>

  <p class="info">
    Click a component → then open Webflow Designer → select a container → Cmd+V
  </p>

  <script>
    // =============================================
    // VAULT — Copy to Webflow
    // =============================================

    const cache = {};

    document.querySelectorAll('.vault-copy').forEach(btn => {

      // Prefetch al hover
      btn.addEventListener('mouseenter', async () => {
        const url = btn.getAttribute('data-vault');
        if (url && !cache[url]) {
          try {
            const res = await fetch(url);
            if (res.ok) {
              const data = await res.json();
              cache[url] = JSON.stringify(data);
            }
          } catch (e) {}
        }
      }, { once: true });

      // Click → Copy
      btn.addEventListener('click', async () => {
        const url = btn.getAttribute('data-vault');
        if (!url || btn.disabled) return;

        btn.disabled = true;

        try {
          let payload = cache[url];
          if (!payload) {
            const res = await fetch(url);
            if (!res.ok) throw new Error('Fetch failed: ' + res.status);
            const data = await res.json();
            payload = JSON.stringify(data);
            cache[url] = payload;
          }

          let copied = false;

          function onCopy(e) {
            e.preventDefault();
            e.clipboardData.setData('application/json', payload);
            e.clipboardData.setData('text/plain', payload);
            copied = true;
          }

          document.addEventListener('copy', onCopy);
          document.execCommand('copy');
          document.removeEventListener('copy', onCopy);

          if (!copied) {
            await navigator.clipboard.writeText(payload);
          }

          btn.classList.add('is-copied');
          setTimeout(() => btn.classList.remove('is-copied'), 2000);

        } catch (err) {
          console.error('[Vault]', err);
          btn.querySelector('.action').textContent = 'Error — retry';
          btn.classList.add('is-error');
          setTimeout(() => {
            btn.classList.remove('is-error');
            btn.querySelector('.action').textContent = 'Copy to Webflow';
          }, 2000);

        } finally {
          btn.disabled = false;
        }
      });
    });
  </script>

</body>
</html>
